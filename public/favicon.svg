<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Round background with a soft creamy/beige color and a delicate celeste border -->
  <circle cx="16" cy="16" r="15" fill="#FAF8F6" stroke="#A2D2FF" stroke-width="1.5" />
  <!-- Elegant, custom text using Playfair Display for a classic serif capital C in soft celeste -->
  <text x="16.5" y="22" font-family="'Playfair Display', 'Didot', 'Georgia', serif" font-size="18.5" font-style="italic" font-weight="500" fill="#4A90E2" text-anchor="middle">C</text>
</svg>
